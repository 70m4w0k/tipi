name: _e2e (reusable)

# Workflow réutilisable : tests E2E Playwright contre un Supabase LOCAL éphémère
# (aucun accès à la prod). Le schéma vient de supabase/migrations/, les comptes de
# test sont créés à la volée par le global-setup (signUp auto-confirmé en local).
on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (migrations + seed)
        run: supabase start

      - name: Export local Supabase env
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$(supabase status -o json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"

      - name: Install Playwright (chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Stop local Supabase
        if: ${{ always() }}
        run: supabase stop --no-backup

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
