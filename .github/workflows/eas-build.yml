name: EAS Build & GitHub Release

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  # Garde-fou anti-régression : le build ne se lance que si les E2E passent.
  e2e:
    uses: ./.github/workflows/_e2e.yml
    secrets: inherit

  # Détecte si le push contient de nouvelles migrations, pour ne demander
  # l'approbation prod que dans ce cas (pas à chaque push de code).
  changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'

  # Applique les migrations en attente à la prod.
  # Gate : le job cible l'environnement "production" (à configurer avec
  # "Required reviewers" dans GitHub → Settings → Environments) → approbation
  # manuelle avant toute modification de la base prod.
  migrate:
    needs: [e2e, changes]
    if: ${{ needs.changes.outputs.migrations == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Appliquer les migrations à la prod
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: rlhkgrhgbnpbxjblyetw

  build:
    needs: [e2e, migrate]
    # Se lance si les E2E passent ET que la migration a réussi OU a été ignorée
    # (aucune nouvelle migration). Bloqué seulement si la migration échoue/est refusée.
    if: ${{ always() && needs.e2e.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --json > build-result.json

      - name: Download APK from EAS
        run: |
          APK_URL=$(node -e "const r=require('./build-result.json'); console.log(Array.isArray(r)?r[0].artifacts.buildUrl:r.artifacts.buildUrl)")
          curl -L -o tipi.apk "$APK_URL"

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Tipi v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: tipi.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
